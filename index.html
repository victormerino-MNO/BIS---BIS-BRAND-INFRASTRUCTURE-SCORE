<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIS — Brand Infrastructure Score | MNO Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --accent: #f90847;
  --bg: #fffaf5;
  --text: #0c0a09;
  --text-light: #78716c;
  --border: #e7e5e4;
  --card-bg: #ffffff;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 40px 24px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.logo-container {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 48px;
}

.logo-container svg {
  height: 48px;
  width: auto;
}

h1 {
  font-family: 'Inter', sans-serif;
  text-transform: uppercase;
  font-weight: 900;
  font-size: 2.2rem;
  line-height: 1.1;
  letter-spacing: -0.03em;
  margin-bottom: 16px;
}

h1 em {
  font-style: italic;
  color: var(--accent);
}

h2 {
  font-family: 'Inter', sans-serif;
  text-transform: uppercase;
  font-weight: 800;
  font-size: 1.4rem;
  line-height: 1.2;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}

h2 em {
  font-style: italic;
  color: var(--accent);
}

.subtitle {
  font-size: 1.05rem;
  line-height: 1.6;
  color: var(--text-light);
  margin-bottom: 32px;
  max-width: 520px;
}

.progress-container {
  margin-bottom: 40px;
}

.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.progress-step {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-light);
}

.progress-bar {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.question-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--accent);
  margin-bottom: 12px;
}

.question-text {
  font-size: 1.15rem;
  line-height: 1.5;
  margin-bottom: 32px;
  font-weight: 500;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 32px;
}

.option {
  padding: 18px 20px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 0.95rem;
  line-height: 1.5;
  background: var(--card-bg);
  position: relative;
}

.option:hover {
  border-color: var(--text);
}

.option.selected {
  border-color: var(--accent);
  background: #fff5f7;
}

.option.selected::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 8px 0 0 8px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 32px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 6px;
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  letter-spacing: 0.02em;
}

.btn-primary:hover {
  background: #d9063d;
  transform: translateY(-1px);
}

.btn-primary:disabled {
  background: var(--border);
  color: var(--text-light);
  cursor: not-allowed;
  transform: none;
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 12px 24px;
  background: transparent;
  color: var(--text);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-secondary:hover {
  border-color: var(--text);
}

.nav-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
  padding-top: 24px;
}

.intro-badges {
  display: flex;
  gap: 12px;
  margin-bottom: 40px;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-light);
}

.result-score-container {
  text-align: center;
  padding: 48px 0 40px;
}

.result-score-number {
  font-family: 'Inter', sans-serif;
  font-size: 6rem;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 8px;
  letter-spacing: -0.04em;
}

.result-score-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-light);
  margin-bottom: 24px;
  line-height: 1.6;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
}

.result-classification {
  font-size: 1.4rem;
  text-transform: uppercase;
  margin-bottom: 16px;
  line-height: 1.2;
  font-weight: 800;
}

.result-description {
  font-size: 1rem;
  line-height: 1.7;
  color: var(--text-light);
  max-width: 480px;
  margin: 0 auto 40px;
}

.impact-box {
  background: var(--text);
  color: var(--bg);
  border-radius: 12px;
  padding: 32px;
  margin-bottom: 32px;
  text-align: center;
}

.impact-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: #a8a29e;
  margin-bottom: 8px;
}

.impact-value {
  font-family: 'Inter', sans-serif;
  font-size: 2.8rem;
  font-weight: 900;
  color: var(--accent);
  margin-bottom: 4px;
  letter-spacing: -0.03em;
}

.impact-sublabel {
  font-size: 0.85rem;
  color: #a8a29e;
  margin-bottom: 20px;
}

.impact-detail {
  font-size: 0.85rem;
  line-height: 1.6;
  color: #d6d3d1;
  border-top: 1px solid #292524;
  padding-top: 16px;
}

.breakdown {
  margin-bottom: 40px;
}

.breakdown-title {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-light);
  margin-bottom: 16px;
}

.breakdown-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}

.breakdown-item-label {
  font-size: 0.9rem;
  font-weight: 500;
}

.breakdown-item-score {
  font-size: 0.85rem;
  font-weight: 700;
}

.insights {
  margin-bottom: 40px;
}

.insights-title {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-light);
  margin-bottom: 16px;
}

.insight-card {
  background: var(--card-bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 24px;
  margin-bottom: 14px;
}

.insight-card.accent {
  background: #fff0f3;
  border-color: #fecdd3;
}

.insight-card-title {
  font-size: 0.95rem;
  font-weight: 700;
  margin-bottom: 10px;
  color: var(--text);
}

.insight-card.accent .insight-card-title {
  color: var(--accent);
}

.insight-card-text {
  font-size: 0.9rem;
  line-height: 1.65;
  color: var(--text-light);
}

.cta-box {
  background: var(--card-bg);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 32px;
  text-align: center;
  margin-bottom: 40px;
}

.cta-box p {
  font-size: 0.95rem;
  line-height: 1.6;
  color: var(--text-light);
  margin-bottom: 24px;
}

.footer {
  text-align: center;
  padding: 32px 0;
  border-top: 1px solid var(--border);
  margin-top: auto;
}

.footer-text {
  font-size: 0.75rem;
  color: var(--text-light);
  letter-spacing: 0.05em;
}

.fade-in {
  animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.score-bar-container {
  width: 100%;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  margin: 24px 0;
  overflow: hidden;
}

.score-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
}

@media (max-width: 480px) {
  .container { padding: 24px 16px; }
  h1 { font-size: 1.7rem; }
  h2 { font-size: 1.2rem; }
  .result-score-number { font-size: 4.5rem; }
  .impact-value { font-size: 2.2rem; }
  .intro-badges { flex-wrap: wrap; }
}
</style>
</head>

<div class="container" id="app"></div>

<script>
const QUESTIONS = [
  {
    id: 'context',
    label: 'CONTEXTO',
    text: 'Quantas pessoas na sua empresa dependem de materiais de marca no dia a dia? (marketing, vendas, RH, liderança)',
    options: [
      { text: 'Menos de 10 pessoas', value: 0, people: 8, hoursPerPerson: 8, costPerHour: 80 },
      { text: '10 a 25 pessoas', value: 0, people: 18, hoursPerPerson: 10, costPerHour: 80 },
      { text: '25 a 50 pessoas', value: 0, people: 38, hoursPerPerson: 12, costPerHour: 85 },

    ]
  },
  {

    options: [
      { text: 'Nunca. Temos templates pra quase tudo.', value: 14 },
      { text: 'Algumas vezes. Depende do tipo de material.', value: 8 },
      { text: 'Frequentemente. Cada peça nova é uma reinvenção.', value: 3 },
      { text: 'Sempre. Não existe nada padronizado.', value: 0 },
    ]
  },
  {
    id: 'governança',

    dimension: 'Governança',
    text: 'Se um designer novo entrasse amanhã, em quanto tempo conseguiria produzir algo dentro do padrão da marca sem supervisão?',
    options: [
      { text: 'Menos de 1 semana. Temos tudo documentado.', value: 14 },
      { text: '2 a 4 semanas. Precisaria de orientação, mas se viraria.', value: 8 },
      { text: '1 a 2 meses. Dependeria de alguem explicar tudo na mao.', value: 3 },
      { text: 'Não sei. Nunca testamos isso.', value: 0 },
    ]
  },
  {
    id: 'consistência',
    label: 'CONSISTÊNCIA',
    dimension: 'Consistência',
    text: 'Quantos materiais o time comercial usa no dia a dia que NÃO passaram pelo marketing?',
    options: [
      { text: 'Nenhum. Tudo sai de um arsenal centralizado.', value: 14 },
      { text: 'Alguns. Vendas adapta coisas por conta própria às vezes.', value: 8 },
      { text: 'Muitos. Cada vendedor monta o próprio material.', value: 3 },
      { text: 'Não faço ideia. Marketing e vendas não conversam sobre isso.', value: 0 },

  {
    id: 'velocidade',

    text: 'O CEO pede um deck institucional atualizado pra uma reunião amanhã. Quanto tempo leva?',
    options: [
      { text: 'Minutos. Já existe pronto e atualizado.', value: 14 },
      { text: 'Algumas horas. Precisa ajustar mas a base existe.', value: 8 },
      { text: 'Um dia inteiro. Alguem vai ter que montar do zero.', value: 3 },
      { text: 'Mais de um dia. E provavelmente vai sair desalinhado.', value: 0 },
    ]
  },
  {
    id: 'percepção',

    options: [
      { text: 'Sim, com clareza. Site, LinkedIn e materiais refletem quem somos.', value: 14 },
      { text: 'Mais ou menos. Algumas coisas estão boas, outras defasadas.', value: 8 },
      { text: 'Provavelmente não. Sabemos que estamos defasados.', value: 3 },
      { text: 'Nunca avaliamos isso do ponto de vista do prospect.', value: 0 },
    ]
  },
  {
    id: 'posicionamento',
    label: 'POSICIONAMENTO',
    dimension: 'Posicionamento',
    text: 'Se você pedisse pra 5 pessoas do time explicarem o que a empresa faz e por que é diferente, as respostas seriam iguais?',
    options: [
      { text: 'Sim. Temos posicionamento claro e todo mundo sabe.', value: 14 },
      { text: 'Parecidas. O conceito geral bate, os detalhes variam.', value: 8 },

const RESULTS = {
  high: {
    range: [80, 100],
    title: 'Marca como Ativo',

      { title: 'O comercial está compensando sozinho', text: 'Se o time de vendas gasta os primeiros minutos de cada call explicando quem a empresa é, a marca não está fazendo o trabalho dela. Cada deal demora mais, cada proposta precisa de mais contexto, cada prospect chega menos convencido.', accent: false }

    title: 'Marca Fantasma',
    description: 'Existe no CNPJ mas não na prática. O time improvisa, o mercado não reconhece, e o comercial carrega sozinho um peso que a marca deveria carregar. Sua empresa é melhor do que parece, e isso está custando dinheiro.',

let state = {
  screen: 'intro',
  currentQuestion: 0,
  answers: {},
  score: 0
};

function getResult(score) {
  const normalized = Math.round((score / 98) * 100);
  if (normalized >= 80) return { ...RESULTS.high, normalized };
  if (normalized >= 50) return { ...RESULTS.medium, normalized };
  if (normalized >= 20) return { ...RESULTS.low, normalized };
  return { ...RESULTS.critical, normalized };
}

function formatCurrency(value) {
  return 'R$ ' + Math.round(value).toLocaleString('pt-BR');
}

function render() {
  const app = document.getElementById('app');
  switch(state.screen) {
    case 'intro': renderIntro(app); break;
    case 'quiz': renderQuiz(app); break;
    case 'gate': renderGate(app); break;
    case 'result': renderResult(app); break;
  }
}

function renderIntro(app) {
  app.innerHTML = `
    <div class="fade-in">
      <div class="logo-container">${LOGO_SVG}</div>
      <div class="question-label">BIS — BRAND INFRASTRUCTURE SCORE</div>
      <h1>SUA MARCA TRABALHA <em>POR VOCÊ</em> OU CONTRA VOCÊ?</h1>
      <p class="subtitle">Descubra quanto da sua operação de marketing está sendo sabotada por falta de sistema.</p>
      <div class="intro-badges">
        <span class="badge">7 perguntas</span>
        <span class="badge">3 minutos</span>
        <span class="badge">Resultado em R$</span>
      </div>
      <button class="btn-primary" onclick="startQuiz()">Iniciar diagnóstico →</button>
      <div class="footer">
        <p class="footer-text">Aplicado por MNO Studio. Resultado imediato e gratuito.</p>
      </div>
    </div>
  `;
}

function renderQuiz(app) {
  const q = QUESTIONS[state.currentQuestion];
  const totalQuestions = QUESTIONS.length;
  const progress = ((state.currentQuestion + 1) / totalQuestions) * 100;
  const selected = state.answers[state.currentQuestion];
  const isContext = q.id === 'context';
  
  app.innerHTML = `
    <div class="fade-in">
      <div class="logo-container">${LOGO_SVG}</div>
      <div class="progress-container">
        <div class="progress-info">
          <span class="progress-step">${isContext ? 'Contexto' : 'Pergunta ' + state.currentQuestion + ' de 7'}</span>
          <span class="progress-step">${Math.round(progress)}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${progress}%"></div>
        </div>
      </div>
      <div class="question-label">${q.label}</div>
      <p class="question-text">${q.text}</p>
      <div class="options">
        ${q.options.map((opt, i) => `
          <div class="option ${selected === i ? 'selected' : ''}" onclick="selectOption(${i})">
            ${opt.text}
          </div>
        `).join('')}

function startQuiz() {

function selectOption(index) {

}

function calculateResults() {
  let rawScore = 0;
  const dimensionScores = [];
  const dimensionWeights = {
    'Retrabalho': 1.18,
    'Governança': 0.88,
    'Consistência': 1.12,
    'Velocidade': 0.95,
    'Percepção': 1.25,
    'Posicionamento': 0.82,
    'Infraestrutura': 1.05
  };
  for (let i = 1; i < QUESTIONS.length; i++) {
    const answerIndex = state.answers[i];
    if (answerIndex !== undefined) {
      const value = QUESTIONS[i].options[answerIndex].value;
      rawScore += value;
      const dim = QUESTIONS[i].dimension;
      const weight = dimensionWeights[dim] || 1;
      const rawWaste = ((14 - value) / 14) * 100;
      const weightedWaste = Math.min(98, Math.max(5, Math.round(rawWaste * weight)));
      dimensionScores.push({ dimension: dim, waste: weightedWaste });
    }
  }
  const result = getResult(rawScore);
  const wastePercent = 100 - result.normalized;
  const contextAnswer = state.answers[0];
  const ctx = QUESTIONS[0].options[contextAnswer || 0];
  const wasteFraction = wastePercent / 100;
  const costMonth = wasteFraction * ctx.people * ctx.hoursPerPerson * ctx.costPerHour;
  const costYear = costMonth * 12;
  const hoursWastedMonth = Math.round(wasteFraction * ctx.people * ctx.hoursPerPerson);
  return { rawScore, dimensionScores, result, wastePercent, ctx, costMonth, costYear, hoursWastedMonth };
}

function nextQuestion() {
  if (state.answers[state.currentQuestion] === undefined) return;
  if (state.currentQuestion < QUESTIONS.length - 1) {
    state.currentQuestion++;
    render();
    window.scrollTo(0, 0);
  } else {
    state.screen = 'gate';
    render();
    window.scrollTo(0, 0);
  }
}

function submitGateForm(e) {
  e.preventDefault();
  const form = document.getElementById('gate-form');
  const nome = form.querySelector('[name="nome"]').value.trim();
  const email = form.querySelector('[name="email"]').value.trim();
  const empresa = form.querySelector('[name="empresa"]').value.trim();
  const cargo = form.querySelector('[name="cargo"]').value.trim();
  const lgpd = form.querySelector('[name="lgpd"]');
  
  if (!nome || !email || !empresa || !cargo) {
    alert('Preencha todos os campos.');
    return;
  }
  if (!lgpd.checked) {
    alert('Aceite receber comunicações para continuar.');
    return;
  }
  
  // Submit to FormSubmit.co via hidden iframe (sends email to you)
  const calc = calculateResults();
  const hiddenForm = document.createElement('form');
  hiddenForm.method = 'POST';
  hiddenForm.action = 'https://formsubmit.co/mno@mnoestudio.com';
  hiddenForm.target = 'hidden-submit';
  hiddenForm.style.display = 'none';
  
  const fields = {
    nome: nome,
    email: email,
    empresa: empresa,
    cargo: cargo,
    score: calc.result.normalized,
    waste: calc.wastePercent + '%',
    cost: 'R$ ' + Math.round(calc.costYear).toLocaleString('pt-BR') + '/ano',
    _subject: 'BIS — Novo lead: ' + empresa,
    _template: 'table',
    _captcha: 'false'
  };
  
  Object.entries(fields).forEach(([key, val]) => {
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = key;
    input.value = val;
    hiddenForm.appendChild(input);
  });
  
  document.body.appendChild(hiddenForm);
  hiddenForm.submit();
  document.body.removeChild(hiddenForm);
  
  // Show result immediately
  showResult();
}
